<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NammaChat — Real-Time Chat</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<!-- SockJS + STOMP (WebSocket client libraries) -->
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<style>
/* ═══════════════════════════════════════
   RESET & ROOT
═══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #080b14;
  --surface:   #0e1220;
  --surface2:  #141827;
  --border:    rgba(255,255,255,0.07);
  --border2:   rgba(255,255,255,0.12);
  --accent:    #4f8ef7;
  --accent2:   #a78bfa;
  --accent3:   #34d399;
  --danger:    #f87171;
  --text:      #e8eaf6;
  --muted:     rgba(232,234,246,0.45);
  --online:    #34d399;
  --msg-me:    linear-gradient(135deg, #4f8ef7 0%, #a78bfa 100%);
  --radius:    14px;
  --font:      'Outfit', sans-serif;
  --mono:      'JetBrains Mono', monospace;
  --shadow:    0 8px 32px rgba(0,0,0,0.4);
  --glow:      0 0 20px rgba(79,142,247,0.25);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ═══════════════════════════════════════
   BACKGROUND
═══════════════════════════════════════ */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(ellipse 70% 55% at 15% 5%,  rgba(79,142,247,0.12)  0%, transparent 65%),
    radial-gradient(ellipse 55% 45% at 85% 85%, rgba(167,139,250,0.10) 0%, transparent 65%),
    radial-gradient(ellipse 45% 35% at 50% 50%, rgba(52,211,153,0.05)  0%, transparent 65%);
  animation: bgPulse 16s ease-in-out infinite alternate;
}
@keyframes bgPulse {
  0%   { filter: hue-rotate(0deg) brightness(1); }
  100% { filter: hue-rotate(20deg) brightness(1.08); }
}

/* ═══════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════ */
#loginScreen {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
  width: 100%;
  max-width: 420px;
  padding: 20px;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

.logo-block { text-align: center; }
.logo-block h1 {
  font-size: 3rem;
  font-weight: 800;
  letter-spacing: -2px;
  background: linear-gradient(135deg, #4f8ef7, #a78bfa, #34d399);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.logo-block p { color: var(--muted); font-size: 0.85rem; margin-top: 6px; }

.card {
  background: rgba(14,18,32,0.85);
  backdrop-filter: blur(28px);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 28px 26px;
  width: 100%;
  box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.07);
}
.card h2 { font-size: 1.05rem; font-weight: 700; margin-bottom: 18px; color: var(--text); }

.field { margin-bottom: 14px; }
.field label {
  display: block;
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 600;
}
.field input, .field select {
  width: 100%;
  padding: 10px 13px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.18);
}
.field input::placeholder { color: var(--muted); }
.field select option { background: #141827; color: #e8eaf6; }

/* Avatar picker */
.avatar-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.av-opt {
  width: 38px; height: 38px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.06);
  transition: all 0.18s;
}
.av-opt:hover { transform: scale(1.18); background: rgba(255,255,255,0.1); }
.av-opt.selected { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,142,247,0.25); }

/* Color picker */
.color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.col-opt {
  width: 26px; height: 26px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.18s;
}
.col-opt:hover { transform: scale(1.2); }
.col-opt.selected { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.3); }

.btn-primary {
  width: 100%;
  padding: 12px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: var(--font);
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
  box-shadow: 0 4px 20px rgba(79,142,247,0.4);
  margin-top: 4px;
  letter-spacing: 0.02em;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(79,142,247,0.5); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Connection status */
.conn-status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.75rem;
  color: var(--muted);
  justify-content: center;
}
.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--danger);
  transition: background 0.3s;
}
.conn-dot.connected { background: var(--online); box-shadow: 0 0 6px var(--online); }
.conn-dot.connecting { background: #fbbf24; animation: pulse 1s infinite; }

/* ═══════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════ */
#app {
  display: none;
  position: relative;
  z-index: 10;
  width: 100vw;
  height: 100vh;
}
#app.active { display: flex; }

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sidebar {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  background: rgba(14,18,32,0.9);
  backdrop-filter: blur(20px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s;
}

.sidebar-header {
  padding: 16px 14px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.brand {
  font-size: 1.1rem;
  font-weight: 800;
  background: linear-gradient(135deg, #4f8ef7, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}
.ws-badge {
  font-size: 0.6rem;
  font-family: var(--mono);
  background: rgba(52,211,153,0.15);
  color: var(--online);
  border: 1px solid rgba(52,211,153,0.25);
  border-radius: 6px;
  padding: 2px 6px;
  font-weight: 500;
}

/* User profile strip */
.user-strip {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px;
  margin: 8px 10px 0;
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.15s;
  flex-shrink: 0;
}
.user-strip:hover { background: rgba(255,255,255,0.07); }
.user-av {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
  position: relative;
}
.online-ring {
  position: absolute;
  bottom: -1px; right: -1px;
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 2px solid var(--surface);
  background: var(--online);
}
.user-name { font-weight: 600; font-size: 0.82rem; }
.user-status { font-size: 0.67rem; color: var(--muted); }

/* Section label */
.section-label {
  padding: 12px 14px 5px;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-weight: 700;
  flex-shrink: 0;
}

/* Room list */
.room-list { flex: 1; overflow-y: auto; padding: 0 8px; }
.room-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s;
  margin-bottom: 2px;
}
.room-item:hover { background: rgba(255,255,255,0.05); }
.room-item.active {
  background: rgba(79,142,247,0.12);
  border: 1px solid rgba(79,142,247,0.2);
}
.room-icon { font-size: 0.95rem; width: 24px; text-align: center; flex-shrink: 0; }
.room-name { font-size: 0.84rem; font-weight: 500; flex: 1; }
.room-count {
  font-size: 0.62rem;
  font-weight: 700;
  background: var(--accent2);
  color: #fff;
  border-radius: 8px;
  padding: 1px 5px;
  min-width: 16px;
  text-align: center;
}

/* Online users */
.online-section { flex-shrink: 0; border-top: 1px solid var(--border); }
.online-list { padding: 6px 10px 10px; max-height: 130px; overflow-y: auto; }
.online-user {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px 6px;
  border-radius: 8px;
  margin-bottom: 1px;
}
.ou-av {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  flex-shrink: 0;
}
.ou-name { font-size: 0.78rem; flex: 1; }
.ou-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--online); box-shadow: 0 0 4px var(--online); }

/* ═══════════════════════════════════════
   CHAT MAIN AREA
═══════════════════════════════════════ */
.chat-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
}

/* Chat header */
.chat-header {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(14,18,32,0.8);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.ch-icon { font-size: 1.2rem; }
.ch-title { font-size: 0.95rem; font-weight: 700; }
.ch-desc { font-size: 0.7rem; color: var(--muted); }
.ch-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.online-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(52,211,153,0.1);
  border: 1px solid rgba(52,211,153,0.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 0.7rem;
  color: var(--online);
  font-weight: 600;
}
.online-pill::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--online);
  box-shadow: 0 0 5px var(--online);
  display: inline-block;
}

/* Messages area */
.messages-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  scroll-behavior: smooth;
}
.messages-wrap::-webkit-scrollbar { width: 4px; }
.messages-wrap::-webkit-scrollbar-track { background: transparent; }
.messages-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* Date divider */
.date-divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 10px 0;
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.date-divider::before, .date-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* System message (join/leave) */
.sys-msg {
  text-align: center;
  font-size: 0.75rem;
  color: var(--muted);
  padding: 4px 12px;
  margin: 4px auto;
  background: rgba(255,255,255,0.03);
  border-radius: 20px;
  border: 1px solid var(--border);
  animation: msgIn 0.3s ease both;
  max-width: 360px;
}

/* Chat message row */
.msg-row {
  display: flex;
  gap: 10px;
  padding: 3px 0;
  animation: msgIn 0.25s ease both;
  position: relative;
}
.msg-row.me { flex-direction: row-reverse; }
@keyframes msgIn {
  from { opacity: 0; transform: translateY(8px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  flex-shrink: 0;
  align-self: flex-end;
  margin-bottom: 2px;
}

.msg-body { max-width: 65%; display: flex; flex-direction: column; gap: 2px; }
.msg-row.me .msg-body { align-items: flex-end; }

.msg-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
.msg-row.me .msg-meta { flex-direction: row-reverse; }
.msg-sender { font-size: 0.73rem; font-weight: 600; }
.msg-time { font-size: 0.65rem; color: var(--muted); font-family: var(--mono); }

.msg-bubble {
  padding: 9px 13px;
  border-radius: 16px;
  font-size: 0.875rem;
  line-height: 1.55;
  word-wrap: break-word;
  position: relative;
  transition: background 0.15s;
}
.msg-row:not(.me) .msg-bubble {
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg-row.me .msg-bubble {
  background: var(--msg-me);
  border-bottom-right-radius: 4px;
  box-shadow: 0 2px 12px rgba(79,142,247,0.25);
}

/* Reactions */
.msg-reactions {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 3px;
}
.reaction-pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 2px 7px;
  font-size: 0.78rem;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 3px;
}
.reaction-pill:hover { background: rgba(79,142,247,0.15); border-color: rgba(79,142,247,0.3); }
.reaction-count { font-size: 0.68rem; color: var(--muted); font-family: var(--mono); }

/* Hover action buttons */
.msg-actions {
  position: absolute;
  top: -18px;
  right: 0;
  display: none;
  gap: 3px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  padding: 3px 5px;
  box-shadow: var(--shadow);
  z-index: 5;
}
.msg-row.me .msg-actions { right: auto; left: 0; }
.msg-row:hover .msg-actions { display: flex; }
.act-btn {
  width: 26px; height: 26px;
  border-radius: 7px;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.8rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, color 0.15s;
}
.act-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

/* Typing indicator */
.typing-area {
  padding: 6px 20px;
  min-height: 26px;
  flex-shrink: 0;
}
.typing-indicator {
  display: none;
  align-items: center;
  gap: 7px;
  font-size: 0.75rem;
  color: var(--muted);
}
.typing-indicator.show { display: flex; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--muted);
  animation: dotBounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes dotBounce {
  0%, 80%, 100% { transform: translateY(0); background: var(--muted); }
  40%            { transform: translateY(-5px); background: var(--accent); }
}

/* Input area */
.input-area {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: rgba(14,18,32,0.7);
  backdrop-filter: blur(10px);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 8px 10px 8px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-row:focus-within {
  border-color: rgba(79,142,247,0.5);
  box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
}
#msgInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 0.875rem;
  resize: none;
  max-height: 120px;
  line-height: 1.5;
  padding: 3px 0;
}
#msgInput::placeholder { color: var(--muted); }

.inp-btn {
  width: 32px; height: 32px;
  border-radius: 9px;
  border: none;
  background: rgba(255,255,255,0.06);
  color: var(--muted);
  cursor: pointer;
  font-size: 0.95rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.inp-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

.send-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  cursor: pointer;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(79,142,247,0.3);
}
.send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 18px rgba(79,142,247,0.45); }
.send-btn:active { transform: scale(0.95); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ═══════════════════════════════════════
   EMOJI PICKER
═══════════════════════════════════════ */
.emoji-panel {
  position: absolute;
  bottom: 80px;
  right: 60px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  padding: 12px;
  box-shadow: var(--shadow);
  z-index: 100;
  display: none;
  width: 300px;
  animation: popIn 0.18s ease both;
}
.emoji-panel.open { display: block; }
@keyframes popIn {
  from { opacity: 0; transform: scale(0.92) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.emoji-cats { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; }
.emoji-cat {
  padding: 4px 9px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.05);
  color: var(--muted);
  cursor: pointer;
  font-size: 0.72rem;
  white-space: nowrap;
  transition: all 0.15s;
}
.emoji-cat.active { background: rgba(79,142,247,0.2); color: var(--accent); }
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 2px;
  max-height: 160px;
  overflow-y: auto;
}
.emoji-item {
  padding: 5px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 1rem;
  text-align: center;
  transition: background 0.12s;
}
.emoji-item:hover { background: rgba(255,255,255,0.08); }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 0.82rem;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow);
  animation: toastIn 0.25s ease both;
  max-width: 280px;
}
.toast.success { border-color: rgba(52,211,153,0.3); }
.toast.error   { border-color: rgba(248,113,113,0.3); }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(30px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  to { opacity: 0; transform: translateX(30px); }
}
.toast.out { animation: toastOut 0.25s ease forwards; }

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25%       { transform: translateX(-6px); }
  75%       { transform: translateX(6px); }
}
.shake { animation: shake 0.3s ease; }

/* Mobile responsive */
@media (max-width: 680px) {
  .sidebar { position: absolute; z-index: 50; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
}
</style>
</head>
<body>

<div class="bg-canvas"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- ═══════════════ LOGIN SCREEN ═══════════════ -->
<div id="loginScreen">
  <div class="logo-block">
    <h1>NammaChat</h1>
    <p>Real-time chat powered by WebSocket</p>
  </div>

  <div class="card">
    <h2>Join the conversation</h2>

    <div class="field">
      <label>Your Name</label>
      <input type="text" id="usernameInput" placeholder="Enter your name..." maxlength="20" autocomplete="off"/>
    </div>

    <div class="field">
      <label>Pick an Avatar</label>
      <div class="avatar-grid" id="avatarGrid"></div>
    </div>

    <div class="field">
      <label>Your Color</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>

    <div class="field">
      <label>Join Room</label>
      <select id="roomSelect">
        <option value="General">💬 General</option>
        <option value="Tech">💻 Tech</option>
        <option value="Gaming">🎮 Gaming</option>
        <option value="Music">🎵 Music</option>
        <option value="Movies">🎬 Movies</option>
        <option value="Random">🎲 Random</option>
      </select>
    </div>

    <button class="btn-primary" id="joinBtn" disabled>Connecting to server...</button>
  </div>

  <div class="conn-status">
    <div class="conn-dot connecting" id="connDot"></div>
    <span id="connText">Connecting to server...</span>
  </div>
</div>

<!-- ═══════════════ APP ═══════════════ -->
<div id="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="brand">NammaChat</span>
      <span class="ws-badge" id="wsBadge">WS ●</span>
    </div>

    <div class="user-strip" id="userStrip">
      <div class="user-av" id="userAvatar">
        <span class="online-ring"></span>
      </div>
      <div>
        <div class="user-name" id="sidebarUsername">—</div>
        <div class="user-status">Online</div>
      </div>
    </div>

    <div class="section-label">Rooms</div>
    <div class="room-list" id="roomList">
      <div class="room-item active" data-room="General">
        <span class="room-icon">💬</span>
        <span class="room-name">General</span>
      </div>
      <div class="room-item" data-room="Tech">
        <span class="room-icon">💻</span>
        <span class="room-name">Tech</span>
      </div>
      <div class="room-item" data-room="Gaming">
        <span class="room-icon">🎮</span>
        <span class="room-name">Gaming</span>
      </div>
      <div class="room-item" data-room="Music">
        <span class="room-icon">🎵</span>
        <span class="room-name">Music</span>
      </div>
      <div class="room-item" data-room="Movies">
        <span class="room-icon">🎬</span>
        <span class="room-name">Movies</span>
      </div>
      <div class="room-item" data-room="Random">
        <span class="room-icon">🎲</span>
        <span class="room-name">Random</span>
      </div>
    </div>

    <div class="online-section">
      <div class="section-label">Online — <span id="onlineCount">0</span></div>
      <div class="online-list" id="onlineList"></div>
    </div>
  </aside>

  <!-- Chat main -->
  <main class="chat-main">
    <div class="chat-header">
      <span class="ch-icon" id="headerIcon">💬</span>
      <div>
        <div class="ch-title" id="headerTitle">General</div>
        <div class="ch-desc" id="headerDesc">Welcome to the General room</div>
      </div>
      <div class="ch-right">
        <div class="online-pill"><span id="headerOnline">0 online</span></div>
      </div>
    </div>

    <div class="messages-wrap" id="messagesWrap">
      <!-- Messages render here -->
    </div>

    <div class="typing-area">
      <div class="typing-indicator" id="typingIndicator">
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span id="typingText">Someone is typing...</span>
      </div>
    </div>

    <div class="input-area" style="position:relative;">
      <!-- Emoji panel -->
      <div class="emoji-panel" id="emojiPanel"></div>

      <div class="input-row">
        <button class="inp-btn" id="emojiBtn" title="Emoji">😊</button>
        <textarea id="msgInput" rows="1" placeholder="Message #General..." maxlength="500"></textarea>
        <button class="send-btn" id="sendBtn" title="Send (Enter)">➤</button>
      </div>
    </div>
  </main>
</div>

<script>
// ════════════════════════════════════════════════════
// CONSTANTS
// ════════════════════════════════════════════════════
const AVATARS = ['😎','🦊','🐼','🦁','🐸','🦄','🐺','🦅','🐙','🦋','🐯','🦉'];
const COLORS  = ['#4f8ef7','#a78bfa','#34d399','#f472b6','#fb923c','#facc15','#38bdf8','#f87171'];
const ROOMS   = {
  General: { icon:'💬', desc:'Welcome to the General room' },
  Tech:    { icon:'💻', desc:'Discuss all things technology' },
  Gaming:  { icon:'🎮', desc:'Gamers assemble!' },
  Music:   { icon:'🎵', desc:'Share your favorite tracks' },
  Movies:  { icon:'🎬', desc:'Films, reviews, recommendations' },
  Random:  { icon:'🎲', desc:'Anything goes here' }
};
const EMOJIS = {
  '😊 Smileys': ['😀','😃','😄','😁','😆','😅','😂','🤣','😊','😇','🙂','😍','🥰','😘','😎','🤩','😏','😒','😔','😢','😭','😤','😠','🤔','🤗','😴','🤤'],
  '❤️ Hearts':  ['❤️','🧡','💛','💚','💙','💜','🖤','🤍','💔','💕','💞','💓','💗','💖','💘','💝'],
  '👍 Gestures':['👍','👎','👏','🙌','🤝','🤜','🤛','✊','👊','🤞','🤟','🤘','👌','✌️','🤙','👋'],
  '🔥 Objects': ['🔥','⚡','💫','✨','🌟','💥','❄️','🌈','☀️','🌙','⭐','🎉','🎊','🎈','🏆','💡'],
};

// ════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════
let stompClient = null;
let currentUser = null;
let currentRoom = 'General';
let selectedAvatar = AVATARS[0];
let selectedColor  = COLORS[0];
let typingTimer    = null;
let isTyping       = false;
let emojiOpen      = false;
let emojiCat       = Object.keys(EMOJIS)[0];
let subscription   = null;

// ════════════════════════════════════════════════════
// DOM REFS
// ════════════════════════════════════════════════════
const loginScreen    = document.getElementById('loginScreen');
const appDiv         = document.getElementById('app');
const usernameInput  = document.getElementById('usernameInput');
const joinBtn        = document.getElementById('joinBtn');
const connDot        = document.getElementById('connDot');
const connText       = document.getElementById('connText');
const messagesWrap   = document.getElementById('messagesWrap');
const msgInput       = document.getElementById('msgInput');
const sendBtn        = document.getElementById('sendBtn');
const emojiBtn       = document.getElementById('emojiBtn');
const emojiPanel     = document.getElementById('emojiPanel');
const typingIndicator= document.getElementById('typingIndicator');
const typingText     = document.getElementById('typingText');
const onlineList     = document.getElementById('onlineList');
const onlineCount    = document.getElementById('onlineCount');
const headerOnline   = document.getElementById('headerOnline');
const headerTitle    = document.getElementById('headerTitle');
const headerDesc     = document.getElementById('headerDesc');
const headerIcon     = document.getElementById('headerIcon');
const sidebarUsername= document.getElementById('sidebarUsername');
const userAvatar     = document.getElementById('userAvatar');

// ════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════
function init() {
  buildAvatarPicker();
  buildColorPicker();
  buildEmojiPanel();
  connectWebSocket();
  bindEvents();
}

// ════════════════════════════════════════════════════
// WEBSOCKET CONNECTION
// ════════════════════════════════════════════════════
function connectWebSocket() {
  // Connect to Spring Boot WebSocket endpoint using SockJS
  const socket = new SockJS(window.location.origin + '/ws');
  stompClient = Stomp.over(socket);

  // Suppress STOMP debug logs in production
  stompClient.debug = null;

  stompClient.connect({}, onConnected, onError);
}

function onConnected() {
  console.log('[NammaChat] WebSocket connected ✓');
  connDot.className = 'conn-dot connected';
  connText.textContent = 'Connected to server';
  joinBtn.disabled = false;
  joinBtn.textContent = 'Join Chat';
  document.getElementById('wsBadge').style.color = 'var(--online)';
}

function onError(error) {
  console.error('[NammaChat] WebSocket error:', error);
  connDot.className = 'conn-dot';
  connText.textContent = 'Connection failed — is the server running?';
  joinBtn.disabled = true;
  joinBtn.textContent = 'Server Offline';
  showToast('⚠️ Cannot reach server. Start Spring Boot on port 8080.', 'error');
}

// ════════════════════════════════════════════════════
// JOIN
// ════════════════════════════════════════════════════
function joinChat() {
  const name = usernameInput.value.trim();
  if (!name) { shake(usernameInput); return; }
  if (!stompClient || !stompClient.connected) { showToast('Not connected to server', 'error'); return; }

  currentUser = { name, avatar: selectedAvatar, color: selectedColor };
  currentRoom = document.getElementById('roomSelect').value;

  // Hide login, show app
  loginScreen.style.display = 'none';
  appDiv.classList.add('active');

  // Update sidebar
  sidebarUsername.textContent = name;
  userAvatar.innerHTML = `${selectedAvatar}<span class="online-ring"></span>`;
  userAvatar.style.background = selectedColor + '33';

  // Mark active room
  setActiveRoom(currentRoom);
  updateHeaderForRoom(currentRoom);
  document.getElementById('msgInput').placeholder = `Message #${currentRoom}...`;

  // Subscribe to room topic
  subscribeToRoom(currentRoom);

  // Send JOIN message to server
  stompClient.send('/app/chat.join', {}, JSON.stringify({
    type: 'JOIN',
    sender: currentUser.name,
    avatar: currentUser.avatar,
    color: currentUser.color,
    room: currentRoom
  }));
}

// ════════════════════════════════════════════════════
// SUBSCRIBE / ROOM SWITCH
// ════════════════════════════════════════════════════
function subscribeToRoom(room) {
  // Unsubscribe from previous room
  if (subscription) subscription.unsubscribe();

  // Subscribe to new room topic
  subscription = stompClient.subscribe(`/topic/room.${room}`, onMessageReceived);
}

function switchRoom(room) {
  if (room === currentRoom) return;

  const oldRoom = currentRoom;
  currentRoom = room;

  // Clear messages
  messagesWrap.innerHTML = '';
  setActiveRoom(room);
  updateHeaderForRoom(room);
  msgInput.placeholder = `Message #${room}...`;

  // Subscribe to new room
  subscribeToRoom(room);

  // Tell server
  stompClient.send('/app/chat.switchRoom', {}, JSON.stringify({
    sender: currentUser.name,
    avatar: currentUser.avatar,
    color: currentUser.color,
    room: room
  }));
}

// ════════════════════════════════════════════════════
// MESSAGE HANDLING
// ════════════════════════════════════════════════════
function onMessageReceived(payload) {
  const msg = JSON.parse(payload.body);

  switch (msg.type) {
    case 'CHAT':
      appendMessage(msg);
      break;
    case 'JOIN':
      appendSystemMsg(`${esc(msg.sender)} joined ${esc(msg.room)} 👋`);
      break;
    case 'LEAVE':
      appendSystemMsg(`${esc(msg.sender)} left the chat`);
      break;
    case 'TYPING':
      showTyping(msg.sender);
      break;
    case 'STOP_TYPING':
      hideTyping();
      break;
    case 'REACTION':
      updateReaction(msg.targetMessageId, msg.emoji);
      break;
    case 'USER_LIST':
      renderOnlineUsers(msg.activeUsers || []);
      break;
    case 'ROOM_HISTORY':
      renderHistory(msg.history || []);
      break;
  }
}

function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !stompClient || !stompClient.connected) return;

  stompClient.send('/app/chat.send', {}, JSON.stringify({
    sender: currentUser.name,
    avatar: currentUser.avatar,
    color: currentUser.color,
    content: text,
    room: currentRoom
  }));

  msgInput.value = '';
  msgInput.style.height = 'auto';
  sendStopTyping();
}

function sendReaction(messageId, emoji) {
  if (!stompClient || !stompClient.connected) return;
  stompClient.send('/app/chat.react', {}, JSON.stringify({
    sender: currentUser.name,
    room: currentRoom,
    targetMessageId: messageId,
    emoji: emoji
  }));
}

// ════════════════════════════════════════════════════
// TYPING INDICATORS
// ════════════════════════════════════════════════════
function handleTyping() {
  if (!isTyping) {
    isTyping = true;
    stompClient.send('/app/chat.typing', {}, JSON.stringify({
      sender: currentUser.name,
      room: currentRoom,
      typing: true
    }));
  }
  clearTimeout(typingTimer);
  typingTimer = setTimeout(sendStopTyping, 2000);
}

function sendStopTyping() {
  if (isTyping) {
    isTyping = false;
    stompClient.send('/app/chat.typing', {}, JSON.stringify({
      sender: currentUser.name,
      room: currentRoom,
      typing: false
    }));
  }
}

function showTyping(sender) {
  if (sender === currentUser.name) return;
  typingText.textContent = `${esc(sender)} is typing...`;
  typingIndicator.classList.add('show');
}

function hideTyping() {
  typingIndicator.classList.remove('show');
}

// ════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ════════════════════════════════════════════════════
function appendMessage(msg) {
  const isMe = msg.sender === currentUser.name;

  const row = document.createElement('div');
  row.className = `msg-row${isMe ? ' me' : ''}`;
  row.dataset.msgId = msg.messageId;

  const time = msg.timestamp
    ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
    : '';

  row.innerHTML = `
    <div class="msg-actions">
      <button class="act-btn" title="React" onclick="quickReact('${msg.messageId}')">😊</button>
      <button class="act-btn" title="Reply" onclick="">↩</button>
    </div>
    <div class="msg-avatar" style="background:${msg.color}22">${esc(msg.avatar)}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-sender" style="color:${msg.color}">${isMe ? 'You' : esc(msg.sender)}</span>
        <span class="msg-time">${time}</span>
      </div>
      <div class="msg-bubble">${esc(msg.content)}</div>
      <div class="msg-reactions" id="react-${msg.messageId}"></div>
    </div>
  `;

  messagesWrap.appendChild(row);
  scrollToBottom();
}

function appendSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  messagesWrap.appendChild(el);
  scrollToBottom();
}

function renderHistory(history) {
  messagesWrap.innerHTML = '';
  if (history.length === 0) return;

  const divider = document.createElement('div');
  divider.className = 'date-divider';
  divider.textContent = 'Previous Messages';
  messagesWrap.appendChild(divider);

  history.forEach(msg => {
    if (msg.type === 'CHAT') appendMessage(msg);
  });
}

function renderOnlineUsers(users) {
  const inRoom = users.filter(u => u.room === currentRoom);
  onlineCount.textContent = inRoom.length;
  headerOnline.textContent = `${inRoom.length} online`;

  onlineList.innerHTML = '';
  inRoom.forEach(u => {
    const el = document.createElement('div');
    el.className = 'online-user';
    el.innerHTML = `
      <div class="ou-av" style="background:${u.color}22">${esc(u.avatar)}</div>
      <span class="ou-name">${esc(u.username)}${u.username === currentUser.name ? ' (you)' : ''}</span>
      <span class="ou-dot"></span>
    `;
    onlineList.appendChild(el);
  });
}

function updateReaction(messageId, emoji) {
  const container = document.getElementById(`react-${messageId}`);
  if (!container) return;

  let pill = container.querySelector(`[data-emoji="${emoji}"]`);
  if (pill) {
    const countEl = pill.querySelector('.reaction-count');
    countEl.textContent = parseInt(countEl.textContent) + 1;
  } else {
    pill = document.createElement('div');
    pill.className = 'reaction-pill';
    pill.dataset.emoji = emoji;
    pill.innerHTML = `${emoji}<span class="reaction-count">1</span>`;
    pill.onclick = () => sendReaction(messageId, emoji);
    container.appendChild(pill);
  }
}

function quickReact(messageId) {
  const quickEmojis = ['👍','❤️','😂','😮','😢','🔥'];
  const existing = document.getElementById(`quick-${messageId}`);
  if (existing) { existing.remove(); return; }

  const picker = document.createElement('div');
  picker.id = `quick-${messageId}`;
  picker.style.cssText = `
    position:absolute; background:var(--surface2); border:1px solid var(--border2);
    border-radius:12px; padding:6px; display:flex; gap:4px; z-index:10;
    box-shadow:var(--shadow); top:-50px;
  `;
  quickEmojis.forEach(em => {
    const b = document.createElement('button');
    b.className = 'emoji-item';
    b.textContent = em;
    b.onclick = () => { sendReaction(messageId, em); picker.remove(); };
    picker.appendChild(b);
  });

  const row = document.querySelector(`[data-msg-id="${messageId}"]`);
  if (row) { row.style.position = 'relative'; row.appendChild(picker); }

  setTimeout(() => picker.remove(), 5000);
}

// ════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════
function setActiveRoom(room) {
  document.querySelectorAll('.room-item').forEach(el => {
    el.classList.toggle('active', el.dataset.room === room);
  });
}

function updateHeaderForRoom(room) {
  const info = ROOMS[room] || { icon: '💬', desc: '' };
  headerTitle.textContent = room;
  headerIcon.textContent = info.icon;
  headerDesc.textContent = info.desc;
}

function scrollToBottom() {
  messagesWrap.scrollTop = messagesWrap.scrollHeight;
}

function showToast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => { t.classList.add('out'); setTimeout(() => t.remove(), 260); }, 3200);
}

function shake(el) {
  el.classList.remove('shake');
  void el.offsetWidth;
  el.classList.add('shake');
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════
// BUILD UI COMPONENTS
// ════════════════════════════════════════════════════
function buildAvatarPicker() {
  const grid = document.getElementById('avatarGrid');
  AVATARS.forEach((av, i) => {
    const el = document.createElement('div');
    el.className = `av-opt${i === 0 ? ' selected' : ''}`;
    el.textContent = av;
    el.onclick = () => {
      document.querySelectorAll('.av-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      selectedAvatar = av;
    };
    grid.appendChild(el);
  });
}

function buildColorPicker() {
  const grid = document.getElementById('colorGrid');
  COLORS.forEach((col, i) => {
    const el = document.createElement('div');
    el.className = `col-opt${i === 0 ? ' selected' : ''}`;
    el.style.background = col;
    el.title = col;
    el.onclick = () => {
      document.querySelectorAll('.col-opt').forEach(x => x.classList.remove('selected'));
      el.classList.add('selected');
      selectedColor = col;
    };
    grid.appendChild(el);
  });
}

function buildEmojiPanel() {
  const cats = Object.keys(EMOJIS);
  emojiPanel.innerHTML = `
    <div class="emoji-cats">
      ${cats.map((c, i) => `<button class="emoji-cat${i===0?' active':''}" data-cat="${c}">${c.split(' ')[0]}</button>`).join('')}
    </div>
    <div class="emoji-grid" id="emojiGrid"></div>
  `;
  emojiPanel.querySelectorAll('.emoji-cat').forEach(btn => {
    btn.onclick = () => {
      emojiPanel.querySelectorAll('.emoji-cat').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      emojiCat = btn.dataset.cat;
      renderEmojiGrid();
    };
  });
  renderEmojiGrid();
}

function renderEmojiGrid() {
  const grid = document.getElementById('emojiGrid');
  if (!grid) return;
  grid.innerHTML = '';
  (EMOJIS[emojiCat] || []).forEach(em => {
    const el = document.createElement('div');
    el.className = 'emoji-item';
    el.textContent = em;
    el.onclick = () => {
      const p = msgInput.selectionStart;
      msgInput.value = msgInput.value.slice(0, p) + em + msgInput.value.slice(p);
      msgInput.focus();
      emojiPanel.classList.remove('open');
      emojiOpen = false;
    };
    grid.appendChild(el);
  });
}

// ════════════════════════════════════════════════════
// EVENT BINDINGS
// ════════════════════════════════════════════════════
function bindEvents() {
  joinBtn.onclick = joinChat;

  usernameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') joinChat();
  });

  sendBtn.onclick = sendMessage;

  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  msgInput.addEventListener('input', () => {
    // Auto resize
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    // Typing
    handleTyping();
  });

  emojiBtn.onclick = (e) => {
    e.stopPropagation();
    emojiOpen = !emojiOpen;
    emojiPanel.classList.toggle('open', emojiOpen);
  };

  document.addEventListener('click', (e) => {
    if (!emojiPanel.contains(e.target) && e.target !== emojiBtn) {
      emojiPanel.classList.remove('open');
      emojiOpen = false;
    }
  });

  // Room switching
  document.querySelectorAll('.room-item').forEach(item => {
    item.onclick = () => switchRoom(item.dataset.room);
  });
}

// ════════════════════════════════════════════════════
// START
// ════════════════════════════════════════════════════
init();
</script>
</body>
